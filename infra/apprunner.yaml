version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip install -r requirements.txt

run:
  runtime-version: 3.11
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: APP_PORT
  env:
    - name: ENVIRONMENT
      value: production
    - name: LOG_LEVEL
      value: INFO
    - name: AWS_REGION
      value: us-east-1
    # Secrets injected from AWS Secrets Manager at deploy time:
    # BEDROCK_KNOWLEDGE_BASE_ID
    # ALLOWED_ORIGINS

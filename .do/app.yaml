name: polydev-coach
region: syd  # Sydney — change to nyc1, ams3, etc. as needed

services:
  # ── Backend API ─────────────────────────────────────────────────────────
  - name: backend
    source_dir: backend
    github:
      repo: YOUR_GITHUB_USERNAME/polydev-coach  # Update this
      branch: main
      deploy_on_push: true
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080
    build_command: pip install -r requirements.txt
    environment_slug: python
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 10
      failure_threshold: 3
    envs:
      - key: GRADIENT_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: PLACEHOLDER  # Set in your deployment platform secret manager
      - key: GRADIENT_BASE_URL
        scope: RUN_TIME
        value: https://bedrock-runtime.${AWS_REGION}.amazonaws.com
      - key: ANALYZER_AGENT_ID
        scope: RUN_TIME
        type: SECRET
        value: PLACEHOLDER
      - key: COACH_AGENT_ID
        scope: RUN_TIME
        type: SECRET
        value: PLACEHOLDER
      - key: REFACTOR_AGENT_ID
        scope: RUN_TIME
        type: SECRET
        value: PLACEHOLDER
      - key: VALIDATOR_AGENT_ID
        scope: RUN_TIME
        type: SECRET
        value: PLACEHOLDER
      - key: OPTIMIZER_AGENT_ID
        scope: RUN_TIME
        type: SECRET
        value: PLACEHOLDER
      - key: ENVIRONMENT
        scope: RUN_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: ${APP_URL}  # Inject this from your deployment platform

  # ── Frontend ─────────────────────────────────────────────────────────────
  - name: frontend
    source_dir: frontend
    github:
      repo: YOUR_GITHUB_USERNAME/polydev-coach  # Update this
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    environment_slug: node-js
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}  # Reference backend service URL
